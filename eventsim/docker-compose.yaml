services:
  eventsim:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: eventsim_generator
    # network_mode: host
    restart: "no"
    mem_limit: 5g
    cpus: 5
    memswap_limit: 5g

    volumes:
      - ./data:/opt/eventsim/data
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f eventsim || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    command: >-
      -c examples/example-config.json

      --kafkaBrokerList kafka1:9092,kafka2:9092,kafka3:9092
      --nusers 100
      --growth-rate 1
      --start-time 2025-04-10T17:00:00
      --end-time 2026-04-10T17:00:00
      --userid 1
      --randomseed 1
    # depends_on:
    #   kafka1:
    #     condition: service_healthy
    #   kafka2:
    #     condition: service_healthy
    #   kafka3:
    #     condition: service_healthy
  
  kafka1:
    image: confluentinc/cp-kafka:7.7.7
    container_name: kafka1
    ports:
      - "9092:9092"

    environment:
      CLUSTER_ID: exbDrwnPTlqim7-51SwxYw

      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      #KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      #KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    volumes:
      - /home/xuanhoang/docker/volumes/kafka1:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  kafka2:
    image: confluentinc/cp-kafka:7.7.7
    container_name: kafka2
    ports:
      - "9093:9092"
    environment:
      CLUSTER_ID: exbDrwnPTlqim7-51SwxYw
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    volumes:
      - /home/xuanhoang/docker/volumes/kafka2:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  kafka3:
    image: confluentinc/cp-kafka:7.7.7
    container_name: kafka3
    ports:
      - "9094:9092"
    environment:
      CLUSTER_ID: exbDrwnPTlqim7-51SwxYw
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    volumes:
      - /home/xuanhoang/docker/volumes/kafka3:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
networks:
  default:
    name: eventsim-network

